<div class="forgot-password-container">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="forgot-password-card">
          <div class="forgot-password-header">
            <div class="icon-circle">
              <span class="lock-icon">🔒</span>
            </div>
            <h2 class="forgot-password-title">Forgot Password?</h2>
            <p class="forgot-password-subtitle">
              No worries! Enter your email address and we'll send you an OTP to
              reset your password.
            </p>
          </div>

          <form
            [formGroup]="form"
            (ngSubmit)="onSubmit()"
            class="forgot-password-form"
          >
            <!-- Email -->
            <div class="form-group-wrapper">
              <label class="form-label-custom" for="email">
                Email Address
              </label>
              <input
                type="email"
                id="email"
                class="form-control-custom"
                formControlName="email"
                placeholder="Enter your email address"
                [ngClass]="{
                  'is-invalid': submitted && f['email'].errors,
                  'is-valid':
                    submitted && !f['email'].errors && f['email'].value,
                }"
              />
              <div class="error-message" *ngIf="submitted && f['email'].errors">
                <small *ngIf="f['email'].errors['required']">
                  Email is required
                </small>
                <small *ngIf="f['email'].errors['email']">
                  Please enter a valid email address
                </small>
              </div>
            </div>

            <!-- Success Message -->
            <div
              class="alert alert-success-custom"
              *ngIf="message"
              role="alert"
            >
              <span class="alert-icon">✓</span>
              <span>{{ message }}</span>
            </div>

            <!-- Submit Button -->
            <div class="d-grid mt-4">
              <button
                type="submit"
                class="btn btn-send-otp"
                [disabled]="form.invalid && submitted"
              >
                <span *ngIf="!submitted || form.valid">Send OTP</span>
                <span *ngIf="submitted && form.invalid">Please fix errors</span>
              </button>
            </div>
          </form>

          <!-- Back to Login Link -->
          <div class="forgot-password-footer">
            <p class="text-center mb-0">
              Remember your password?
              <a routerLink="/login" class="login-link">Sign In</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
