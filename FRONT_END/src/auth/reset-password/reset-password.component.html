<div class="reset-password-container">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-5">
      <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="reset-password-card">
          <div class="reset-password-header">
            <div class="icon-circle">
              <span class="key-icon">🔑</span>
            </div>
            <h2 class="reset-password-title">Reset Password</h2>
            <p class="reset-password-subtitle">Create a new secure password for your account</p>
          </div>
          
          <form [formGroup]="form" (ngSubmit)="onSubmit()" class="reset-password-form">
            <!-- New Password -->
            <div class="form-group-wrapper">
              <label class="form-label-custom" for="newPassword">
                New Password
              </label>
              <input 
                type="password" 
                id="newPassword"
                class="form-control-custom" 
                formControlName="newPassword"
                placeholder="Enter your new password"
                [ngClass]="{'is-invalid': submitted && f['newPassword'].errors, 'is-valid': submitted && !f['newPassword'].errors && f['newPassword'].value}"
              />
              <div class="error-message" *ngIf="submitted && f['newPassword'].errors">
                <small *ngIf="f['newPassword'].errors['required']">
                  Password is required
                </small>
                <small *ngIf="f['newPassword'].errors['minlength']">
                  Password must be at least 6 characters
                </small>
                <small *ngIf="f['newPassword'].errors['pattern']">
                  Password must contain at least one digit
                </small>
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group-wrapper">
              <label class="form-label-custom" for="confirmPassword">
                Confirm Password
              </label>
              <input 
                type="password" 
                id="confirmPassword"
                class="form-control-custom" 
                formControlName="confirmPassword"
                placeholder="Confirm your new password"
                [ngClass]="{'is-invalid': submitted && (f['confirmPassword'].errors || form.errors?.['passwordMismatch']), 'is-valid': submitted && !f['confirmPassword'].errors && !form.errors?.['passwordMismatch'] && f['confirmPassword'].value}"
              />
              <div class="error-message" *ngIf="submitted && (f['confirmPassword'].errors || form.errors?.['passwordMismatch'])">
                <small *ngIf="f['confirmPassword'].errors?.['required']">
                  Please confirm your password
                </small>
                <small *ngIf="f['confirmPassword'].errors?.['mismatch'] || form.errors?.['passwordMismatch']">
                  Passwords do not match
                </small>
              </div>
            </div>

            <!-- Success Message -->
            <div class="alert alert-success-custom" *ngIf="successMessage" role="alert">
              <span class="alert-icon">✓</span>
              <span>{{ successMessage }}</span>
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger-custom" *ngIf="errorMessage" role="alert">
              <span class="alert-icon">⚠</span>
              <span>{{ errorMessage }}</span>
            </div>

            <!-- Submit Button -->
            <div class="d-grid mt-4">
              <button 
                type="submit" 
                class="btn btn-reset"
                [disabled]="form.invalid && submitted"
              >
                <span *ngIf="!submitted || form.valid">Reset Password</span>
                <span *ngIf="submitted && form.invalid">Please fix errors</span>
              </button>
            </div>
          </form>

          <!-- Back to Login Link -->
          <div class="reset-password-footer">
            <p class="text-center mb-0">
              Remember your password? 
              <a href="/login" class="login-link">Sign In</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
